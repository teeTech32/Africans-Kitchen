services:
  nextjs:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
      - .env.local
    depends_on:
      - redis
      - db
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - WATCHPACK_POLLING=true
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: foodiesApp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      # start_period: 30s

volumes:
  postgres_data:
  node_modules: